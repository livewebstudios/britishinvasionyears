# Decap CMS — The British Invasion Years
# The band manages BLOG POSTS and TOUR DATES here. Page-level edits are LWS.
#
# Setup checklist (one-time, on Netlify):
#   1. Identity > Enable Identity
#   2. Identity > Services > Enable Git Gateway
#   3. Identity > Invite users (the band's email), accept invite, set password
#
# Both collections are FILE collections writing a single JSON file each.
# The site renders them live via fetch() — no build step, Netlify redeploys
# in ~30s. (Repo root is the build/ folder, so paths have no "build/" prefix.)

backend:
  name: git-gateway
  branch: main

# Where images uploaded in the CMS are stored / referenced (relative paths).
media_folder: "images/blog"
public_folder: "images/blog"

collections:
  # ---------------------------------------------------------------- TOUR DATES
  - name: "tour"
    label: "Tour Dates"
    files:
      - name: "shows"
        label: "Tour Dates"
        file: "content/tour.json"
        description: "Add or edit shows here. Once a show's date passes it drops off the public Tour page automatically — but it STAYS in this list, so you can always scroll down to see past shows. Only delete a show if you want it gone for good."
        fields:
          - label: "Shows"
            name: "shows"
            label_singular: "Show"
            widget: "list"
            summary: "{{fields.date}} — {{fields.venue}}"
            fields:
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD", hint: "Show date. Anything before today is hidden automatically." }
              - { label: "Time", name: "time", widget: "string", hint: "e.g. 7:30 PM — or '6:00 PM · Show 1 of 2' for a double bill." }
              - { label: "Venue", name: "venue", widget: "string" }
              - { label: "City / Address", name: "city", widget: "string" }
              - label: "Status"
                name: "status"
                widget: "select"
                default: "onsale"
                options:
                  - { label: "On sale (Get Tickets button)", value: "onsale" }
                  - { label: "Coming soon (RSVP button)", value: "tba" }
              - { label: "Ticket URL", name: "ticketUrl", widget: "string", required: false, hint: "Bandsintown / box-office link. Leave blank for Coming soon shows." }
              - { label: "Badge", name: "badge", widget: "string", required: false, hint: "Optional flag, e.g. 'Limited seats just released'." }

  # ---------------------------------------------------------------- BLOG POSTS
  - name: "blog"
    label: "Blog"
    files:
      - name: "posts"
        label: "Blog Posts"
        file: "content/blog.json"
        description: "Add, edit, reorder, or delete blog posts. Old posts can stay up indefinitely."
        fields:
          - label: "Posts"
            name: "posts"
            label_singular: "Post"
            widget: "list"
            summary: "{{fields.title}}  —  {{fields.date}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Slug", name: "slug", widget: "string", hint: "Lowercase, hyphenated. Used in the post URL (post.html?slug=...)." }
              - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "British Invasion", value: "british-invasion" }
                  - { label: "Band News", value: "band-news" }
                  - { label: "Show Announcement", value: "show-announcement" }
                  - { label: "Venue Spotlight", value: "venue-spotlight" }
                  - { label: "Press", value: "press" }
              - { label: "Tags", name: "tags", widget: "list", required: false }
              - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "The most recent featured post is highlighted at the top of the blog." }
              - { label: "Hero Image", name: "image", widget: "image", required: false, hint: "Leave blank to reuse an existing stage photo path." }
              - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1–2 sentence summary shown on the blog index." }
              - { label: "Body", name: "body", widget: "text", hint: "Plain text. Blank line = new paragraph. Supports **bold**, *italic*, and [link text](url)." }

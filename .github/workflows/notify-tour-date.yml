name: Notify on new tour date

# Fires whenever content/tour.json changes on main — i.e. the band added or
# edited a show in Decap (/admin/). Opens a GitHub issue so Jon gets pinged
# (via his normal repo notifications) to run the "What to Do in [City]" blog
# prompt for the new date. Uses the built-in GITHUB_TOKEN — no SMTP secrets,
# nothing to authenticate, so it can't fail on credentials.
on:
  push:
    branches: [main]
    paths:
      - "content/tour.json"

permissions:
  contents: read
  issues: write

jobs:
  notify-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo (need parent commit for the diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build the tour.json change summary
        id: diff
        run: |
          {
            echo "diff<<EOF"
            git diff HEAD^ HEAD -- content/tour.json || echo "(no diff available)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open a reminder issue
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_BY: ${{ github.event.head_commit.author.name }}
          COMMIT_WHEN: ${{ github.event.head_commit.timestamp }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          BODY="$(cat <<EOF
          The band just changed the Tour Dates in Decap.

          Commit:  $COMMIT_MSG
          By:      $COMMIT_BY
          When:    $COMMIT_WHEN
          Commit:  $COMMIT_URL

          ----- change to content/tour.json -----
          $DIFF
          ---------------------------------------

          If this is a NEW show on sale, open Claude Code in build/ and run:
            "Create a 'What to Do in [City]' blog post for the new tour date
             and wire it to that tour card's whatToDoSlug."
          EOF
          )"
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "🎸 New/updated tour date on The British Invasion Years" \
            --body "$BODY"
